name = "xreviews-web"
main = ".open-next/worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
APP_NAME = "Xreviews"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "xreviews-evidence-prod"

# Cloudflare Queues are intentionally not bound in Phase 0.
# Add them in the async jobs phase only when a real queue consumer exists.
